<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Endereço - ContabilCMRT</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
</head>

<body class="body-clientes">

    <header class="header-custom">
        <div>
            <div class="header-title">Cadastro de Endereço</div>
            <div class="header-subtitle">
                Informe os dados de localização para o registro contábil
            </div>
        </div>

        <div class="header-direita">
            <a href="../prototipo.html">
                <i data-lucide="arrow-left"></i>
                Voltar
            </a>
        </div>
    </header>

    <main class="container-form">
        <div class="card-form">

            <form id="formEndereco">

                <!-- DADOS DE LOCALIZAÇÃO -->
                <fieldset class="form-section">
                    <h3 class="section-title">Dados de Localização</h3>

                    <div class="form-grid cols-3">
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Logradouro / Rua *</label>
                            <input type="text" name="logradouro" placeholder="Ex: Av. Ana Costa" required
                                maxlength="255">
                        </div>

                        <div class="form-group">
                            <label>Número *</label>
                            <input type="text" name="numero" placeholder="Ex: 123" required maxlength="10">
                        </div>
                    </div>

                    <div class="form-grid cols-2">
                        <div class="form-group">
                            <label>Bairro *</label>
                            <input type="text" name="bairro" placeholder="Ex: Gonzaga" required maxlength="100">
                        </div>

                        <div class="form-group">
                            <label>CEP *</label>
                            <input type="text" name="cep" id="cep" placeholder="00000-000" required maxlength="9">
                        </div>
                    </div>
                </fieldset>

                <!-- REGIÃO -->
                <fieldset class="form-section">
                    <h3 class="section-title">Região e Referência</h3>

                    <div class="form-grid cols-2">
                        <div class="form-group">
                            <label>Cidade *</label>
                            <input type="text" name="cidade" required maxlength="100">
                        </div>

                        <div class="form-group">
                            <label>Estado (UF) *</label>
                            <select name="estado" required>
                                <option value="" disabled selected>Selecione...</option>
                                <option value="AC">AC</option>
                                <option value="AL">AL</option>
                                <option value="AP">AP</option>
                                <option value="AM">AM</option>
                                <option value="BA">BA</option>
                                <option value="CE">CE</option>
                                <option value="DF">DF</option>
                                <option value="ES">ES</option>
                                <option value="GO">GO</option>
                                <option value="MA">MA</option>
                                <option value="MT">MT</option>
                                <option value="MS">MS</option>
                                <option value="MG">MG</option>
                                <option value="PA">PA</option>
                                <option value="PB">PB</option>
                                <option value="PR">PR</option>
                                <option value="PE">PE</option>
                                <option value="PI">PI</option>
                                <option value="RJ">RJ</option>
                                <option value="RN">RN</option>
                                <option value="RS">RS</option>
                                <option value="RO">RO</option>
                                <option value="RR">RR</option>
                                <option value="SC">SC</option>
                                <option value="SP">SP</option>
                                <option value="SE">SE</option>
                                <option value="TO">TO</option>
                            </select>
                        </div>
                    </div>
                </fieldset>

                <!-- BOTÕES -->
                <div class="form-actions">
                    <button type="button" class="btn-contabil btn-limpar" onclick="this.form.reset()">
                        <i data-lucide="rotate-ccw"></i> Limpar Campos
                    </button>

                    <button type="submit" class="btn-contabil btn-salvar">
                        <i data-lucide="save"></i> SALVAR
                    </button>
                </div>

            </form>
        </div>
    </main>
    <script src="../javascript/script.js"></script>
    <script>
        lucide.createIcons();
    </script>

</body>

</html>
