<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contas a Pagar</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="body-clientes">

    <!-- HEADER -->
    <header class="header-custom">
        <div>
            <div class="header-title">Cadastro de Contas a Pagar</div>
            <div class="header-subtitle">
                Registro e controle de obrigações financeiras
            </div>
        </div>

        <div class="header-direita">
            <a href="../prototipo.html">
                <i data-lucide="arrow-left"></i>
                Voltar
            </a>
        </div>
    </header>

    <!-- FORM -->
    <main class="container-form">
        <div class="card-form">

            <form id="formContasPagar">

                <!-- 1. IDENTIFICAÇÃO -->
                <fieldset class="form-section">
                    <h3 class="section-title">1. Dados da Conta</h3>

                    <div class="form-grid cols-2">
                        <div class="form-group">
                            <label>Descrição *</label>
                            <input type="text" name="descricao" required placeholder="Ex: Conta de Energia">
                        </div>

                        <div class="form-group">
                            <label>Fornecedor *</label>
                            <input type="text" name="fornecedor" required placeholder="Nome do fornecedor">
                        </div>
                    </div>

                    <div class="form-grid cols-3">
                        <div class="form-group">
                            <label>Categoria</label>
                            <input type="text" name="categoria" placeholder="Ex: Despesas Fixas">
                        </div>

                        <div class="form-group">
                            <label>Valor *</label>
                            <input type="number" step="0.01" name="valor" required>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select name="status">
                                <option value="PENDENTE">Pendente</option>
                                <option value="PAGO">Pago</option>
                                <option value="ATRASADO">Atrasado</option>
                            </select>
                        </div>
                    </div>
                </fieldset>

                <!-- 2. DATAS -->
                <fieldset class="form-section">
                    <h3 class="section-title">2. Datas e Controle</h3>

                    <div class="form-grid cols-3">
                        <div class="form-group">
                            <label>Data de Emissão</label>
                            <input type="date" name="data_emissao">
                        </div>

                        <div class="form-group">
                            <label>Data de Vencimento *</label>
                            <input type="date" name="data_vencimento" required>
                        </div>

                        <div class="form-group">
                            <label>Data de Pagamento</label>
                            <input type="date" name="data_pagamento">
                        </div>
                    </div>
                </fieldset>

                <!-- 3. PAGAMENTO -->
                <fieldset class="form-section">
                    <h3 class="section-title">3. Informações de Pagamento</h3>

                    <div class="form-grid cols-3">
                        <div class="form-group">
                            <label>Forma de Pagamento</label>
                            <select name="forma_pagamento">
                                <option value="BOLETO">Boleto</option>
                                <option value="PIX">PIX</option>
                                <option value="TRANSFERENCIA">Transferência</option>
                                <option value="DINHEIRO">Dinheiro</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Número Documento</label>
                            <input type="text" name="numero_documento">
                        </div>

                        <div class="form-group">
                            <label>Observações</label>
                            <input type="text" name="observacoes">
                        </div>
                    </div>
                </fieldset>

                <!-- BOTÕES -->
                <div class="form-actions">
                    <button type="button" class="btn-cancelar-contabil" onclick="this.form.reset()">
                        <i data-lucide="rotate-ccw"></i> Limpar
                    </button>

                    <button type="submit" class="btn-salvar-contabil">
                        <i data-lucide="save"></i> SALVAR
                    </button>
                </div>

            </form>
        </div>
    </main>

    <!-- SCRIPT -->
    <script>
        lucide.createIcons();

        document.getElementById('formContasPagar').addEventListener('submit', async function(e) {
            e.preventDefault();

            const dados = Object.fromEntries(new FormData(this).entries());

            try {
                const response = await fetch('http://localhost:3000/api/contas-pagar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const resultado = await response.json();

                if (response.ok) {
                    alert('✅ Conta registrada com sucesso!');
                    this.reset();
                } else {
                    alert('❌ Erro: ' + resultado.error);
                }

            } catch (err) {
                alert('❌ Erro ao conectar com o servidor\n' + err.message);
            }
        });
    </script>

</body>
</html>
